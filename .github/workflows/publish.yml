name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Explain Local Publish Flow
        shell: pwsh
        run: |
          Write-Host "This repository now publishes GitHub Releases from local Release-Pro artifacts."
          Write-Host "Run Teleport/publish.ps1 on your own machine after building and obfuscating locally."
          Write-Host "The GitHub Actions workflow is kept only as a visible reminder to avoid accidental cloud rebuilds."
