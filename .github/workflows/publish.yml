name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_publish:
        description: Force a publish even if the version did not change
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Version Change
        id: version
        shell: pwsh
        run: |
          $versionPath = 'Teleport/Teleport.csproj'
          $currentContent = Get-Content $versionPath -Raw
          $currentVersion = [regex]::Match($currentContent, '<Version>([^<]+)</Version>').Groups[1].Value

          if ([string]::IsNullOrWhiteSpace($currentVersion)) {
            throw 'Unable to read <Version> from Teleport/Teleport.csproj'
          }

          $forcePublish = '${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ inputs.force_publish }}' -eq 'true'
          $changed = $true

          if (-not $forcePublish -and (git rev-list --count HEAD) -gt 1) {
            $previousContent = git show HEAD^:$versionPath 2>$null
            if ($LASTEXITCODE -eq 0 -and $previousContent) {
              $previousVersion = [regex]::Match($previousContent, '<Version>([^<]+)</Version>').Groups[1].Value
              if ($previousVersion -eq $currentVersion) {
                $changed = $false
              }
            }
          }

          "current=$currentVersion" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          "changed=$($changed.ToString().ToLowerInvariant())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Stop Early If Version Unchanged
        if: steps.version.outputs.changed != 'true'
        shell: pwsh
        run: Write-Host 'Version unchanged. Skipping publish pipeline.'

      - name: Set up .NET
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud Latest
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip -DestinationPath "$env:AppData\XIVLauncherCN\Addon\Hooks\dev"
          Expand-Archive -Force latest.zip -DestinationPath "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore NuGet Packages
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: dotnet restore Teleport\Teleport.csproj

      - name: Build Release-Pro Package
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          dotnet build --no-restore -c Release-Pro Teleport\Teleport.csproj `
            -p:AssemblyVersion=${{ steps.version.outputs.current }} `
            -p:FileVersion=${{ steps.version.outputs.current }} `
            -p:PackageVersion=${{ steps.version.outputs.current }} `
            -p:InformationalVersion=${{ steps.version.outputs.current }} `
            --output .\build

      - name: Pack Release Zip
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          if (Test-Path .\build\latest.zip) {
            Remove-Item .\build\latest.zip -Force
          }
          Compress-Archive -Path .\build\* -DestinationPath .\build\latest.zip

      - name: Read Built Manifest
        if: steps.version.outputs.changed == 'true'
        id: manifest
        shell: pwsh
        run: |
          $manifest = Get-Content .\build\Teleport.json -Raw | ConvertFrom-Json
          if ([string]::IsNullOrWhiteSpace($manifest.Name)) {
            throw 'Manifest Name is empty'
          }

          "plugin_name=$($manifest.Name)" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          "internal_name=$($manifest.InternalName)" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          "icon_name=tp.jpg" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Generate Repo Manifest
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          $manifest = Get-Content .\build\Teleport.json -Raw | ConvertFrom-Json
          $downloadLink = "https://github.com/${{ github.repository }}/releases/latest/download/latest.zip"
          $repoEntry = [ordered]@{
            Author = $manifest.Author
            Name = $manifest.Name
            InternalName = $manifest.InternalName
            AssemblyVersion = "${{ steps.version.outputs.current }}"
            Description = $manifest.Description
            ApplicableVersion = $manifest.ApplicableVersion
            RepoUrl = $manifest.RepoUrl
            DalamudApiLevel = $manifest.DalamudApiLevel
            LoadRequiredState = $manifest.LoadRequiredState
            LoadSync = $manifest.LoadSync
            CanUnloadAsync = $manifest.CanUnloadAsync
            LoadPriority = $manifest.LoadPriority
            IconUrl = $manifest.IconUrl
            Punchline = $manifest.Punchline
            AcceptsFeedback = $manifest.AcceptsFeedback
            DownloadLinkInstall = $downloadLink
            DownloadLinkTesting = $downloadLink
            DownloadLinkUpdate = $downloadLink
          }

          @($repoEntry) | ConvertTo-Json -Depth 8 | Set-Content -Path .\build\repo.json -Encoding utf8

      - name: Push Release Tag
        if: steps.version.outputs.changed == 'true'
        env:
          PUSH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $tag = "${{ steps.version.outputs.current }}"
          $remote = "https://x-access-token:$env:PUSH_TOKEN@github.com/${{ github.repository }}.git"
          git remote set-url origin $remote

          if (-not (git tag -l $tag)) {
            git tag $tag
            git push origin "refs/tags/$tag"
          }

      - name: Publish GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.current }}
          files: |
            ./build/latest.zip
            ./build/repo.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update PantsPlugins
        if: steps.version.outputs.changed == 'true'
        env:
          PUSH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        shell: pwsh
        run: |
          git clone "https://x-access-token:$env:PUSH_TOKEN@github.com/uiharuayako/PantsPlugins.git" pantsplugins

          $pluginDir = Join-Path 'pantsplugins\plugins' '${{ steps.manifest.outputs.plugin_name }}'
          New-Item -ItemType Directory -Force -Path $pluginDir | Out-Null
          New-Item -ItemType Directory -Force -Path 'pantsplugins\icons' | Out-Null

          Copy-Item .\build\latest.zip (Join-Path $pluginDir 'latest.zip') -Force
          Copy-Item .\build\Teleport.json (Join-Path $pluginDir 'Teleport.json') -Force
          Copy-Item .\icon.jpg (Join-Path 'pantsplugins\icons' '${{ steps.manifest.outputs.icon_name }}') -Force

          Set-Location pantsplugins
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins icons

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host 'No PantsPlugins changes to commit.'
            exit 0
          }

          git commit -m "Update ${{ steps.manifest.outputs.plugin_name }} to ${{ steps.version.outputs.current }}"
          git push origin HEAD:master

      - name: Bump Next Version
        if: steps.version.outputs.changed == 'true'
        env:
          PUSH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        shell: pwsh
        run: |
          $parts = "${{ steps.version.outputs.current }}".Split('.')
          if ($parts.Count -lt 1) {
            throw 'Version format is invalid'
          }

          $parts[$parts.Count - 1] = ([int]$parts[$parts.Count - 1] + 1).ToString()
          $nextVersion = $parts -join '.'

          $versionPath = 'Teleport/Teleport.csproj'
          $content = Get-Content $versionPath -Raw
          $updated = [regex]::Replace($content, '<Version>[^<]+</Version>', "<Version>$nextVersion</Version>", 1)

          if ($updated -eq $content) {
            throw 'Failed to update version in Teleport/Teleport.csproj'
          }

          Set-Content -Path $versionPath -Value $updated

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $versionPath
          git commit -m "Bump version to $nextVersion [skip publish]"

          $remote = "https://x-access-token:$env:PUSH_TOKEN@github.com/${{ github.repository }}.git"
          git remote set-url origin $remote
          git push origin HEAD:main

      - name: Trigger Post-Bump Build
        if: steps.version.outputs.changed == 'true'
        env:
          PUSH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "token $env:PUSH_TOKEN"
            Accept = "application/vnd.github+json"
            "User-Agent" = "Codex"
          }

          $body = @{
            event_type = "post-bump-build"
          } | ConvertTo-Json

          Invoke-RestMethod -Method Post `
            -Uri "https://api.github.com/repos/${{ github.repository }}/dispatches" `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json"
