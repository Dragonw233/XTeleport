name: Build And Publish

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:APPDATA\XIVLauncherCN\Addon\Hooks\dev"

      - name: Prepare Jiagu Tools
        shell: pwsh
        run: |
          $toolRoot = Join-Path $env:GITHUB_WORKSPACE "tools\jiagu"
          New-Item -ItemType Directory -Force -Path $toolRoot | Out-Null

          if (Test-Path "$env:GITHUB_WORKSPACE\ci-assets\jiagu\dnr75-main") {
            Copy-Item "$env:GITHUB_WORKSPACE\ci-assets\jiagu\dnr75-main" $toolRoot -Recurse -Force
          }

          if (Test-Path "$env:GITHUB_WORKSPACE\ci-assets\jiagu\NekoPara.OOD.exe") {
            Copy-Item "$env:GITHUB_WORKSPACE\ci-assets\jiagu\NekoPara.OOD.exe" $toolRoot -Force
          }

          if (!(Test-Path "$toolRoot\dnr75-main\bin\dnr7.5\dotNET_Reactor.Console.exe")) {
            throw "dotNET Reactor missing under $toolRoot"
          }

          if (!(Test-Path "$toolRoot\NekoPara.OOD.exe")) {
            throw "NekoPara.OOD.exe missing under $toolRoot"
          }

      - name: Restore
        run: dotnet restore

      - name: Build Release-Pro
        shell: pwsh
        run: dotnet build .\Teleport.csproj --configuration Release-Pro -p:JiaguRoot="$env:GITHUB_WORKSPACE\tools\jiagu" -p:EnableJiagu=true

      - name: Normalize latest.zip
        shell: pwsh
        run: |
          $sourceZip = Join-Path $env:GITHUB_WORKSPACE "bin\x64\Release-Pro.zip"
          $targetZip = Join-Path $env:GITHUB_WORKSPACE "latest.zip"
          if (!(Test-Path $sourceZip)) {
            throw "Package zip not found: $sourceZip"
          }
          Copy-Item $sourceZip $targetZip -Force

      - name: Generate Version
        id: generate_version
        shell: pwsh
        run: |
          $time = (Get-Date).ToUniversalTime().AddHours(8).ToString("yyyyMMddHHmmss")
          "VERSION=$time" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.generate_version.outputs.VERSION }}
          name: Release ${{ steps.generate_version.outputs.VERSION }}
          files: |
            ./latest.zip
            ./Teleport.json
          generate_release_notes: true

      - name: Update Latihas repo.json
        shell: pwsh
        env:
          LATIHAS_REPO_TOKEN: ${{ secrets.LATIHAS_REPO_TOKEN }}
        run: |
          if (-not $env:LATIHAS_REPO_TOKEN) {
            throw "Missing secret: LATIHAS_REPO_TOKEN"
          }

          $repoDir = Join-Path $env:RUNNER_TEMP "latihas-dalamud-plugins"
          git clone "https://x-access-token:$env:LATIHAS_REPO_TOKEN@github.com/Latihas/dalamud-plugins.git" $repoDir

          $repoJsonPath = Join-Path $repoDir "repo.json"
          $manifest = Get-Content (Join-Path $env:GITHUB_WORKSPACE "Teleport.json") -Raw | ConvertFrom-Json
          $entries = @((Get-Content $repoJsonPath -Raw) | ConvertFrom-Json)

          $downloadLink = "https://github.com/Dragonw233/XTeleport/releases/latest/download/latest.zip"
          $repoUrl = "https://github.com/Dragonw233/XTeleport"

          $entries = @($entries | Where-Object { $_.InternalName -ne $manifest.InternalName })

          $newEntry = [ordered]@{
            Author = $manifest.Author
            Name = $manifest.Name
            InternalName = $manifest.InternalName
            AssemblyVersion = "${{ steps.generate_version.outputs.VERSION }}"
            Description = $manifest.Description
            ApplicableVersion = $manifest.ApplicableVersion
            RepoUrl = $repoUrl
            DalamudApiLevel = $manifest.DalamudApiLevel
            LoadRequiredState = 0
            LoadSync = $false
            CanUnloadAsync = $false
            LoadPriority = 0
            IconUrl = $manifest.IconUrl
            Punchline = $manifest.Punchline
            AcceptsFeedback = $true
            DownloadLinkInstall = $downloadLink
            DownloadLinkTesting = $downloadLink
            DownloadLinkUpdate = $downloadLink
          }

          $entries += [pscustomobject]$newEntry
          $entries = $entries | Sort-Object InternalName
          $entries | ConvertTo-Json -Depth 10 | Set-Content $repoJsonPath -Encoding utf8

          Set-Location $repoDir
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo.json

          $changes = git status --porcelain
          if (-not $changes) {
            Write-Host "No repo.json changes to commit."
            exit 0
          }

          git commit -m "Update Teleport from $env:GITHUB_SHA"
          git push
